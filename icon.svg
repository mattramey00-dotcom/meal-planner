<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8ecf2"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Plate - outer ring -->
  <circle cx="256" cy="270" r="140" fill="url(#plate)" opacity="0.95"/>
  <!-- Plate - inner circle -->
  <circle cx="256" cy="270" r="100" fill="none" stroke="#d1d9e6" stroke-width="2"/>
  <!-- Plate - center accent -->
  <circle cx="256" cy="270" r="45" fill="none" stroke="#c5cdd8" stroke-width="1.5" stroke-dasharray="4 4"/>
  
  <!-- Fork (left side) -->
  <g transform="translate(105, 140) rotate(-15, 20, 100)">
    <!-- Fork handle -->
    <rect x="16" y="100" width="8" height="130" rx="4" fill="white" opacity="0.95"/>
    <!-- Fork head -->
    <rect x="16" y="40" width="8" height="65" rx="2" fill="white" opacity="0.95"/>
    <!-- Fork tines -->
    <rect x="4" y="20" width="5" height="70" rx="2.5" fill="white" opacity="0.95"/>
    <rect x="14" y="15" width="5" height="75" rx="2.5" fill="white" opacity="0.95"/>
    <rect x="24" y="15" width="5" height="75" rx="2.5" fill="white" opacity="0.95"/>
    <rect x="34" y="20" width="5" height="70" rx="2.5" fill="white" opacity="0.95"/>
    <!-- Fork bridge -->
    <rect x="4" y="85" width="35" height="6" rx="3" fill="white" opacity="0.95"/>
  </g>
  
  <!-- Knife (right side) -->
  <g transform="translate(365, 140) rotate(15, 20, 100)">
    <!-- Knife handle -->
    <rect x="12" y="105" width="10" height="125" rx="5" fill="white" opacity="0.95"/>
    <!-- Knife blade -->
    <path d="M12,105 L12,25 C12,20 17,15 22,15 L22,105 Z" fill="white" opacity="0.95"/>
    <!-- Blade edge highlight -->
    <path d="M22,20 L22,105" stroke="#d1d9e6" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- Subtle steam lines -->
  <path d="M220,155 Q225,140 230,155" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M252,145 Q257,128 262,145" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.35"/>
  <path d="M284,152 Q289,137 294,152" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.3"/>
</svg>

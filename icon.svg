<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Cart body -->
  <path d="M130,175 L160,175 L200,330 L370,330 L395,200 L185,200" 
        stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>
  
  <!-- Cart basket fill (subtle) -->
  <path d="M185,200 L200,330 L370,330 L395,200 Z" fill="white" opacity="0.12"/>
  
  <!-- Items peeking out of cart -->
  <!-- Apple -->
  <circle cx="250" cy="260" r="28" fill="#ef4444" opacity="0.85"/>
  <path d="M250,232 Q255,222 260,228" stroke="#22c55e" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Bread/baguette -->
  <rect x="290" y="240" width="55" height="22" rx="11" fill="#f59e0b" opacity="0.8" transform="rotate(-20, 317, 251)"/>
  
  <!-- Carrot -->
  <rect x="220" y="280" width="45" height="12" rx="6" fill="#f97316" opacity="0.8" transform="rotate(10, 242, 286)"/>
  <path d="M265,278 Q272,270 268,276" stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Leafy green peeking up -->
  <ellipse cx="340" cy="265" rx="18" ry="30" fill="#22c55e" opacity="0.7" transform="rotate(15, 340, 265)"/>
  <ellipse cx="355" cy="270" rx="14" ry="25" fill="#16a34a" opacity="0.6" transform="rotate(-10, 355, 270)"/>
  
  <!-- Wheels -->
  <circle cx="225" cy="365" r="24" fill="none" stroke="white" stroke-width="14" opacity="0.95"/>
  <circle cx="225" cy="365" r="6" fill="white" opacity="0.7"/>
  <circle cx="345" cy="365" r="24" fill="none" stroke="white" stroke-width="14" opacity="0.95"/>
  <circle cx="345" cy="365" r="6" fill="white" opacity="0.7"/>
</svg>
